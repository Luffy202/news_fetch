services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: news-fetch-backend
    restart: unless-stopped
    environment:
      AUTH_MODE: ${AUTH_MODE:-auto}
      WECHAT_COOKIE: ${WECHAT_COOKIE:-}
      WECHAT_TOKEN: ${WECHAT_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./browser_data:/app/browser_data
      - ./output:/app/output
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${FRONTEND_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: news-fetch-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
